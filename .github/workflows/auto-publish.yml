name: Generate Daily News
on:
  schedule:
    - cron: '0 7 * * *' # Gira ogni mattina alle 7:00
  workflow_dispatch: # Ti permette di avviarlo a mano con un tasto

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm install
      - name: Run generation script
        run: node index.js # Assicurati che il tuo script si chiami index.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add .
          git commit -m "Nuovi articoli generati" || exit 0
          git push

          from: NotiziHub Bot
          body: |
            Generazione articoli completata!
            
            Data: ${{ env.TODAY }}
            
            Controlla il report completo su GitHub Actions.
